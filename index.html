<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
        background:linear-gradient(to bottom right, #dff6dd , #b8e994);
    }
         .container{
            width: 300px;
            height: 350px;
            border: 2px solid black;
            margin: 20px auto;
            border-radius: 10px;
            background-color: white;
            box-shadow:2px 2px 2px  rgb(65, 59, 59);
            
           
        }
        .box1{
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 2px solid black;
            position: relative;
            top: 10px;
            left: 10px;
            box-shadow: 2px 2px 2px black;

        }
        .box1 img{
            width:85px;
            height:85px;
          border-radius: 50%;
            
        }
        .box2{
             width: 85px;
            height: 85px;
              border-radius: 50%;
            border: 2px solid black;
            position: relative;
            left: 200px;
            top: -80px;
            box-shadow: 2px 2px 2px black;
        }
        .box2 img{
             width: 85px;
            height: 85px;
              border-radius: 50%;
        }
         .box3{
             width: 75px;
            height: 85px;
              border-radius: 50%;
            border: 2px solid black;
             position: relative;
             margin: -50px auto;
             box-shadow: 2px 2px 2px black;
        }
        .box3 img{
             width: 75px;
            height: 85px;
              border-radius: 50%;
        }
         .box4{
             width: 85px;
            height: 70px;
              border-radius: 50%;
            border: 2px solid black;
             position: relative;
             left:200px;
             bottom: -80px;
             top: 100px;
             box-shadow: 2px 2px 2px black;
        }
        .box4 img{
             width: 85px;
            height: 70px;
              border-radius: 50%;
        }
         .box5{
             width: 85px;
            height: 70px;
              border-radius: 50%;
            border: 2px solid black;
             position: relative;
             left: 10px;
              top: 25px;
              box-shadow: 2px 2px 2px black;
        }
        .box5 img{
             width: 85px;
            height: 70px;
              border-radius: 50%;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">
            <img src="image1.jpg" alt="">
        </div> 
        <div class="box2"> 
            <img src="image2.jpg" alt="">
        </div>
        <div class="box3"> 
            <img src="image3.jpg" alt=""></div>
        <div class="box4">
            <img src="image4.jpg" alt="">
        </div>
         <div class="box5">
            <img src="image5.jpg" alt="">
         </div>
    </div> 
</body>
</html>
